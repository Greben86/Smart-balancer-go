# Конфигурация Prometheus для сбора метрик
global:
  scrape_interval: 1s
  evaluation_interval: 1s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'module-monitoring'
    metrics_path: '/metrics'
    scrape_interval: 1s
    static_configs:
      - targets: ['module-monitoring:9090']