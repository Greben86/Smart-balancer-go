# version field is obsolete and ignored in current Docker Compose, kept for reference only

services:
  go-service:
    build:
      context: ./smart-balancer-go
      dockerfile: ./smart-balancer-go/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - REDIS_ADDR=redis:6379
      - PORT=8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://go-service:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - service-network

  test-client:
    build:
      context: ./test-client
      dockerfile: ./test-client/Dockerfile
    environment:
      - TARGET_URL=http://go-service:8080/heartbeat
      - INTERVAL=1s
    restart: unless-stopped
    networks:
      - service-network
    depends_on:
      - go-service
    deploy:
      replicas: 10

