# Основные настройки Grafana
[server]
# Можно указать домен, если нужно
# domain = localhost
# enforce_domain = true

[auth]
# Отключает форму входа — но при анонимном доступе это не обязательно
disable_login_form = false

[auth.anonymous]
# Включает анонимный доступ
enabled = true
# Организация по умолчанию
org_name = Main Org.
# Роль по умолчанию — Admin, чтобы был полный доступ
org_role = Admin

[users]
# Не разрешать регистрацию
allow_sign_up = false
# Автоматически добавлять пользователей в организацию
auto_assign_org = true
auto_assign_org_role = Admin
